<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="/assets/TechRiders.png" alt="Tech Riders Logo" class="login-logo" />
    </div>

    <h1>Bienvenido a Tech Riders</h1>
    <p class="subtitle">Plataforma de Mentorías Tecnológicas</p>

    <form [formGroup]="formulario" (ngSubmit)="entrar()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="tu.email@ejemplo.com"
          class="form-input"
        />
        <span
          class="error-message"
          *ngIf="formulario.get('email')?.invalid && formulario.get('email')?.touched"
        >
          Email válido requerido
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Tu contraseña"
          class="form-input"
        />
        <span
          class="error-message"
          *ngIf="formulario.get('password')?.invalid && formulario.get('password')?.touched"
        >
          Contraseña requerida (mín. 6 caracteres)
        </span>
      </div>

      <button type="submit" [disabled]="!formulario.valid" class="btn-entrar">Entrar</button>
    </form>

    <p class="footer-text">© 2026 Tech Riders. Todos los derechos reservados.</p>
  </div>
</div>
