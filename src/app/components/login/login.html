<app-navbar></app-navbar>

<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="/assets/TechRiders.png" alt="Tech Riders Logo" class="login-logo" />
    </div>

    <h1>Iniciar Sesión</h1>
    <p class="subtitle">Accede a tu cuenta en Tech Riders</p>

    <form [formGroup]="formulario" (ngSubmit)="entrar()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="tu.email@ejemplo.com"
          class="form-input"
        />
        <span
          class="error-message"
          *ngIf="formulario.get('email')?.invalid && formulario.get('email')?.touched"
        >
          Email válido requerido
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Tu contraseña"
          class="form-input"
        />
        <span
          class="error-message"
          *ngIf="formulario.get('password')?.invalid && formulario.get('password')?.touched"
        >
          Contraseña requerida
        </span>
      </div>

      <button type="submit" [disabled]="!formulario.valid" class="btn-entrar">
        Iniciar Sesión
      </button>
    </form>

    <div class="footer-section">
      <p>
        ¿No tienes cuenta?
        <a routerLink="/registro" class="link-registro">Crear una nueva</a>
      </p>
    </div>
  </div>
</div>
